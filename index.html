<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-lang-key="title"></title>

    <link rel="stylesheet" href="./assets/css/style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        background-image: url("./assets/images/bg-image.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        overflow: hidden;
      }

      .page-content {
        width: 100%;
        height: 100%;
        transition:
          filter 0.4s ease,
          transform 0.4s ease;
      }

      body.video-open .page-content {
        filter: blur(0.5vw);
        pointer-events: none;
        user-select: none;
      }

      .video-btn {
        position: fixed;
        top: 3vw;
        left: 4%;
        z-index: 50;
      }

      .start-video-btn {
        width: 10vw;
        height: 3.5vw;
        border-radius: 10vw;
        background: #6168ea;
        box-shadow: 0.2vw 0.2vw 0.3vw rgba(0, 0, 0, 0.829);
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        gap: 1vw;
        padding: 0 1vw;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
        border: 0.2vw solid white;
      }

      .start-video-btn:hover {
        transform: scale(1.03);
      }

      .start-video-btn:active {
        transform: scale(0.98);
      }

      .play-icon {
        width: 2vw;
        height: 2vw;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f6ed76;
        font-size: 1.8vw;
        filter: drop-shadow(0 0.15vw 0.15vw rgba(0, 0, 0, 0.25));
      }

      .play-icon i,
      .close-video-btn i,
      .video-center-play i,
      .control-btn i {
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        flex: 0 0 auto;
      }

      .play-icon i {
        width: 1.6vw;
        min-width: 1.6vw;
        max-width: 1.6vw;
        font-size: 1.5vw;
      }

      .close-video-btn i {
        width: 1.8vw;
        min-width: 1.8vw;
        max-width: 1.8vw;
      }

      .video-center-play i {
        width: 2.2vw;
        min-width: 2.2vw;
        max-width: 2.2vw;
      }

      .control-btn i {
        width: 1.4vw;
        min-width: 1.4vw;
        max-width: 1.4vw;
      }

      .start-text {
        font-size: 2.3vw;
        font-weight: 900;
        letter-spacing: 0.2vw;
        color: #f6ed76;
        line-height: 1;
        font-family: "MouseMemoirs";
      }

      .video-popup {
        position: fixed;
        inset: 0;
        z-index: 999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.38);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.35s ease,
          visibility 0.35s ease;
      }

      .video-popup.active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .video-box {
        position: relative;
        width: 68vw;
        aspect-ratio: 16 / 9;
        border-radius: 1.2vw;
        background: rgba(255, 255, 255, 0.15);
        padding: 0.8vw;
        box-shadow: 0 1vw 3vw rgba(0, 0, 0, 0.45);
        transform: scale(0.82);
        opacity: 0;
        transition:
          transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.35s ease;
      }

      .video-popup.active .video-box {
        transform: scale(1);
        opacity: 1;
      }

      .video-frame {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 0.9vw;
        overflow: hidden;
        background: #000;
      }

      .popup-video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        background: #000;
      }

      .close-video-btn {
        position: absolute;
        top: -1.4vw;
        right: -1.4vw;
        width: 3.4vw;
        height: 3.4vw;
        border: none;
        border-radius: 50%;
        background: #ffffff;
        color: #333333;
        font-size: 1.8vw;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        box-shadow: 0 0.35vw 1vw rgba(0, 0, 0, 0.35);
        transition:
          transform 0.25s ease,
          background 0.25s ease,
          color 0.25s ease;
      }

      .close-video-btn:hover {
        transform: rotate(90deg) scale(1.08);
        background: #6168ea;
        color: #ffffff;
      }

      .custom-controls {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 5;
        padding: 1vw;
        display: flex;
        flex-direction: column;
        gap: 0.75vw;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.82),
          rgba(0, 0, 0, 0.45),
          rgba(0, 0, 0, 0)
        );
        opacity: 1;
        transition: opacity 0.25s ease;
      }

      .video-frame.controls-hidden .custom-controls {
        opacity: 0;
        pointer-events: none;
      }

      .progress-wrap {
        width: 100%;
        display: flex;
        align-items: center;
      }

      .video-progress {
        width: 100%;
        appearance: none;
        -webkit-appearance: none;
        height: 0.45vw;
        border-radius: 5vw;
        background: rgba(255, 255, 255, 0.35);
        cursor: default;
        overflow: hidden;
        pointer-events: none;
      }

      .video-progress::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 1vw;
        height: 1vw;
        border-radius: 50%;
        background: #ffe137;
        box-shadow: -70vw 0 0 69.6vw #ffe137;
        cursor: default;
      }

      .video-progress::-moz-range-thumb {
        width: 1vw;
        height: 1vw;
        border: none;
        border-radius: 50%;
        background: #ffe137;
        cursor: default;
      }

      .video-progress::-moz-range-progress {
        height: 0.45vw;
        border-radius: 5vw;
        background: #ffe137;
      }

      .control-row {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1vw;
      }

      .control-left,
      .control-right {
        display: flex;
        align-items: center;
        gap: 0.8vw;
      }

      .control-btn {
        width: 2.8vw;
        min-width: 2.8vw;
        max-width: 2.8vw;
        height: 2.8vw;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        color: #ffffff;
        font-size: 1.2vw;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          background 0.25s ease,
          color 0.25s ease,
          transform 0.25s ease;
      }

      .control-btn:hover {
        background: #ffe137;
        color: #222222;
        transform: scale(1.08);
      }

      .time-text {
        color: #ffffff;
        font-size: 1.05vw;
        font-weight: 700;
        font-family: Arial, sans-serif;
        letter-spacing: 0.05vw;
        min-width: 8vw;
      }

      .volume-range {
        width: 7vw;
        appearance: none;
        -webkit-appearance: none;
        height: 0.4vw;
        border-radius: 5vw;
        background: rgba(255, 255, 255, 0.35);
        cursor: pointer;
      }

      .volume-range::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 0.9vw;
        height: 0.9vw;
        border-radius: 50%;
        background: #ffe137;
        cursor: pointer;
      }

      .volume-range::-moz-range-thumb {
        width: 0.9vw;
        height: 0.9vw;
        border: none;
        border-radius: 50%;
        background: #ffe137;
        cursor: pointer;
      }

      .video-center-play {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 6vw;
        min-width: 6vw;
        max-width: 6vw;
        height: 6vw;
        border: 0.22vw solid rgba(255, 255, 255, 0.8);
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.35);
        color: #ffe137;
        font-size: 2.2vw;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transform: translate(-50%, -50%) scale(1);
        z-index: 4;
        transition:
          opacity 0.25s ease,
          transform 0.25s ease,
          background 0.25s ease;
      }

      .video-center-play.hide {
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0.8);
      }

      .video-center-play:hover {
        background: rgba(0, 0, 0, 0.55);
        transform: translate(-50%, -50%) scale(1.08);
      }

      .video-box:fullscreen {
        width: 100%;
        height: 100%;
        border-radius: 0;
        padding: 0;
        background: #000;
      }

      .video-box:fullscreen .video-frame {
        border-radius: 0;
      }

      .video-box:fullscreen .close-video-btn {
        top: 1.5vw;
        right: 1.5vw;
      }
    </style>
  </head>

  <body>
    <div class="page-content">
      <div class="video-btn">
        <button class="start-video-btn" type="button">
          <span class="play-icon">
            <i class="fa-solid fa-play"></i>
          </span>
          <span class="start-text">START</span>
        </button>
      </div>

      <div class="title">
        <span data-lang-key="title"></span>
      </div>

      <div class="language-container">
        <div class="english active">E</div>
        <div class="hindi">H</div>
        <div class="gujarati">G</div>
      </div>

      <main>
        <a class="circle circle-2" href="what-is-friendship.html">
          <img src="./assets/images/plain-circle.png" alt="" />
          <img
            class="expression-5"
            src="./assets/images/left-top-circel.png"
            alt=""
          />
          <div class="caption caption-1" data-lang-key="title-1"></div>
        </a>

        <a class="circle circle-3" href="why-do-we-need-friend.html">
          <img src="./assets/images/plain-circle.png" alt="" />
          <img
            class="expression-6"
            src="./assets/images/right-top-circel.png"
            alt=""
          />
          <div class="caption caption-2" data-lang-key="title-2"></div>
        </a>

        <a class="circle circle-4" href="friendship-grow.html">
          <img src="./assets/images/plain-circle.png" alt="" />
          <img
            class="expression-7"
            src="./assets/images/bottom-circel.png"
            alt=""
          />
          <div class="caption caption-3" data-lang-key="title-3"></div>
        </a>

        <div class="circle-1">
          <img src="./assets/images/plain-circle.png" alt="" />
          <img
            class="expression-1"
            src="./assets/images/center-circel-expression-1.png"
            alt=""
          />
          <img
            class="expression-2"
            src="./assets/images/center-circel-expression-2.png"
            alt=""
          />
          <img
            class="expression-3"
            src="./assets/images/center-circel-expression-3.png"
            alt=""
          />
          <img
            class="expression-4"
            src="./assets/images/center-circel-expression-4.png"
            alt=""
          />
        </div>
      </main>
    </div>

    <div class="video-popup">
      <div class="video-box">
        <button class="close-video-btn" type="button">
          <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="video-frame">
          <video
            class="popup-video"
            src="./assets/video/video.mp4"
            preload="metadata"
            controlsList="nodownload noplaybackrate"
            disablePictureInPicture
          ></video>

          <button class="video-center-play" type="button">
            <i class="fa-solid fa-play"></i>
          </button>

          <div class="custom-controls">
            <div class="progress-wrap">
              <input
                class="video-progress"
                type="range"
                min="0"
                max="100"
                value="0"
                step="0.1"
                tabindex="-1"
                aria-hidden="true"
              />
            </div>

            <div class="control-row">
              <div class="control-left">
                <button class="control-btn play-pause-btn" type="button">
                  <i class="fa-solid fa-play"></i>
                </button>

                <div class="time-text">
                  <span class="current-time">0:00</span>
                  /
                  <span class="total-time">0:00</span>
                </div>
              </div>

              <div class="control-right">
                <button class="control-btn mute-btn" type="button">
                  <i class="fa-solid fa-volume-high"></i>
                </button>

                <input
                  class="volume-range"
                  type="range"
                  min="0"
                  max="1"
                  step="0.01"
                  value="1"
                />

                <button class="control-btn fullscreen-btn" type="button">
                  <i class="fa-solid fa-expand"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./assets/js/app.js"></script>

    <script>
      const startVideoBtn = document.querySelector(".start-video-btn");
      const videoPopup = document.querySelector(".video-popup");
      const videoBox = document.querySelector(".video-box");
      const closeVideoBtn = document.querySelector(".close-video-btn");
      const popupVideo = document.querySelector(".popup-video");
      const videoFrame = document.querySelector(".video-frame");

      const centerPlayBtn = document.querySelector(".video-center-play");
      const playPauseBtn = document.querySelector(".play-pause-btn");
      const playPauseIcon = playPauseBtn.querySelector("i");
      const centerPlayIcon = centerPlayBtn.querySelector("i");

      const videoProgress = document.querySelector(".video-progress");
      const currentTimeText = document.querySelector(".current-time");
      const totalTimeText = document.querySelector(".total-time");

      const muteBtn = document.querySelector(".mute-btn");
      const muteIcon = muteBtn.querySelector("i");
      const volumeRange = document.querySelector(".volume-range");
      const fullscreenBtn = document.querySelector(".fullscreen-btn");
      const fullscreenIcon = fullscreenBtn.querySelector("i");

      let controlsTimer;
      let lastVolume = 1;

      function formatTime(time) {
        if (!time || isNaN(time)) return "0:00";

        const minutes = Math.floor(time / 60);
        const seconds = Math.floor(time % 60);

        return `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
      }

      function updatePlayIcons() {
        if (popupVideo.paused) {
          playPauseIcon.className = "fa-solid fa-play";
          centerPlayIcon.className = "fa-solid fa-play";
          centerPlayBtn.classList.remove("hide");
        } else {
          playPauseIcon.className = "fa-solid fa-pause";
          centerPlayIcon.className = "fa-solid fa-pause";
          centerPlayBtn.classList.add("hide");
        }
      }

      function togglePlay() {
        if (!popupVideo) return;

        if (popupVideo.paused) {
          popupVideo.play().catch(() => {});
        } else {
          popupVideo.pause();
        }
      }

      function openVideoPopup() {
        if (!videoPopup || !popupVideo) return;

        document.body.classList.add("video-open");
        videoPopup.classList.add("active");

        popupVideo.currentTime = 0;
        popupVideo.volume = Number(volumeRange.value);
        popupVideo.muted = false;

        videoProgress.value = 0;
        currentTimeText.textContent = "0:00";

        updateMuteIcon();
        updatePlayIcons();

        setTimeout(() => {
          popupVideo.play().catch(() => {});
        }, 250);
      }

      function closeVideoPopup() {
        if (!videoPopup || !popupVideo) return;

        popupVideo.pause();
        popupVideo.currentTime = 0;
        videoProgress.value = 0;
        currentTimeText.textContent = "0:00";

        videoPopup.classList.remove("active");
        document.body.classList.remove("video-open");

        if (document.fullscreenElement) {
          document.exitFullscreen().catch(() => {});
        }

        updatePlayIcons();
      }

      function updateProgress() {
        if (!popupVideo.duration) return;

        const progressValue =
          (popupVideo.currentTime / popupVideo.duration) * 100;

        videoProgress.value = progressValue;
        currentTimeText.textContent = formatTime(popupVideo.currentTime);
        totalTimeText.textContent = formatTime(popupVideo.duration);
      }

      function updateMuteIcon() {
        if (popupVideo.muted || popupVideo.volume === 0) {
          muteIcon.className = "fa-solid fa-volume-xmark";
        } else if (popupVideo.volume < 0.5) {
          muteIcon.className = "fa-solid fa-volume-low";
        } else {
          muteIcon.className = "fa-solid fa-volume-high";
        }
      }

      function toggleMute() {
        if (popupVideo.muted || popupVideo.volume === 0) {
          popupVideo.muted = false;
          popupVideo.volume = lastVolume || 1;
          volumeRange.value = popupVideo.volume;
        } else {
          lastVolume = popupVideo.volume;
          popupVideo.muted = true;
          volumeRange.value = 0;
        }

        updateMuteIcon();
      }

      function changeVolume() {
        const volumeValue = Number(volumeRange.value);

        popupVideo.volume = volumeValue;
        popupVideo.muted = volumeValue === 0;

        if (volumeValue > 0) {
          lastVolume = volumeValue;
        }

        updateMuteIcon();
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          videoBox.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen().catch(() => {});
        }
      }

      function updateFullscreenIcon() {
        if (document.fullscreenElement) {
          fullscreenIcon.className = "fa-solid fa-compress";
        } else {
          fullscreenIcon.className = "fa-solid fa-expand";
        }
      }

      function showControlsTemporarily() {
        videoFrame.classList.remove("controls-hidden");

        clearTimeout(controlsTimer);

        if (!popupVideo.paused) {
          controlsTimer = setTimeout(() => {
            videoFrame.classList.add("controls-hidden");
          }, 2200);
        }
      }

      if (startVideoBtn) {
        startVideoBtn.addEventListener("click", openVideoPopup);
      }

      if (closeVideoBtn) {
        closeVideoBtn.addEventListener("click", closeVideoPopup);
      }

      if (videoPopup) {
        videoPopup.addEventListener("click", function (e) {
          if (e.target === videoPopup) {
            closeVideoPopup();
          }
        });
      }

      if (popupVideo) {
        popupVideo.addEventListener("click", togglePlay);
        popupVideo.addEventListener("play", updatePlayIcons);
        popupVideo.addEventListener("pause", updatePlayIcons);
        popupVideo.addEventListener("timeupdate", updateProgress);
        popupVideo.addEventListener("loadedmetadata", updateProgress);
        popupVideo.addEventListener("ended", updatePlayIcons);

        popupVideo.addEventListener("contextmenu", function (e) {
          e.preventDefault();
        });
      }

      centerPlayBtn.addEventListener("click", togglePlay);
      playPauseBtn.addEventListener("click", togglePlay);
      muteBtn.addEventListener("click", toggleMute);
      volumeRange.addEventListener("input", changeVolume);
      fullscreenBtn.addEventListener("click", toggleFullscreen);

      videoFrame.addEventListener("mousemove", showControlsTemporarily);
      videoFrame.addEventListener("click", showControlsTemporarily);

      document.addEventListener("fullscreenchange", updateFullscreenIcon);

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && videoPopup.classList.contains("active")) {
          closeVideoPopup();
        }

        if (!videoPopup.classList.contains("active")) return;

        if (e.code === "Space") {
          e.preventDefault();
          togglePlay();
        }

        if (e.key.toLowerCase() === "m") {
          toggleMute();
        }

        if (e.key.toLowerCase() === "f") {
          toggleFullscreen();
        }
      });
    </script>
  </body>
</html>
