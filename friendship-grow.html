<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-lang-key="title-3"></title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="./assets/css/style.css" />

    <style>
      body {
        background-image: url("./assets/images/bg-image-1.png");
      }

      .title span {
        font-size: 5vw;
      }

      .title {
        border-radius: 1.5vw;
      }

      html[lang="Hindi"] .title,
      html[lang="Gujarati"] .title {
        padding: 1.5vw 2vw 0.5vw 2vw;
      }

      html[lang="Hindi"] .title span,
      html[lang="Gujarati"] .title span {
        font-size: 4vw;
        font-weight: 700;
      }
    </style>
  </head>

  <body>
    <a class="home-btn" href="index.html">
      <img src="./assets/images/home-btn.png" alt="" />
    </a>

    <div class="title">
      <span data-lang-key="title-3">Title</span>
    </div>

    <div class="language-container">
      <div class="english active">E</div>
      <div class="hindi">H</div>
      <div class="gujarati">G</div>
    </div>

    <main>
      <div class="pages">
        <a
          class="page page-1"
          data-lang-key="num-1"
          href="what-is-friendship.html"
        ></a>
        <a
          class="page page-2"
          data-lang-key="num-2"
          href="why-do-we-need-friend.html"
        ></a>
        <a
          class="page page-3"
          data-lang-key="num-3"
          href="friendship-grow.html"
        ></a>
      </div>

      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/6.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.1"></div>
          </div>

          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/7.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.2"></div>
          </div>

          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/8.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.3"></div>
          </div>

          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/9.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.4"></div>
          </div>

          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/10.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.5"></div>
          </div>

          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/11.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.6"></div>
          </div>

          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/12.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.7"></div>
          </div>

          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/13.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.8"></div>
          </div>

          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/14.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.9"></div>
          </div>

          <div class="swiper-slide">
            <div class="image-box">
              <video src="./assets/video/15.mp4" autoplay muted loop></video>
            </div>
            <div class="swiper-text" data-lang-key="slide-3.10"></div>
          </div>
        </div>

        <div class="custom-nav">
          <button class="custom-prev hidden">
            <i class="fa-solid fa-angle-left custom-prev-1"></i>
            <i class="fa-solid fa-angles-left custom-prev-2"></i>
          </button>
          <button class="custom-next">
            <i class="fa-solid fa-angle-right custom-next-1"></i>
            <i class="fa-solid fa-angles-right custom-next-2"></i>
          </button>
        </div>

        <div class="swiper-pagination"></div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
      const prevBtn = document.querySelector(".custom-prev");
      const nextBtn = document.querySelector(".custom-next");

      const swiper = new Swiper(".mySwiper", {
        loop: false,
        slidesPerView: 1,
        spaceBetween: 0,
        effect: "fade",
        fadeEffect: {
          crossFade: true,
        },
        speed: 800,
        allowTouchMove: false,

        pagination: {
          el: ".swiper-pagination",
          clickable: true,
          renderBullet: function (index, className) {
            return `<span class="${className}"></span>`;
          },
        },

        on: {
          init: function () {
            updateNavButtons(this);
          },
          slideChange: function () {
            updateNavButtons(this);
          },
        },
      });

      function updateNavButtons(swiperInstance) {
        prevBtn.classList.toggle("hidden", swiperInstance.isBeginning);

        /* next button should always stay visible */
        nextBtn.classList.remove("hidden");
      }

      prevBtn.addEventListener("click", function () {
        if (!swiper.isBeginning) {
          swiper.slidePrev();
        }
      });

      nextBtn.addEventListener("click", function () {
        if (swiper.isEnd) {
          window.location.href = "pranam.html";
        } else {
          swiper.slideNext();
        }
      });
    </script>
    <script src="./assets/js/app.js"></script>
  </body>
</html>
